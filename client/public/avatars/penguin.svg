<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- body -->
  <ellipse cx="40" cy="55" rx="20" ry="20" fill="#1a1a2e"/>
  <!-- white belly -->
  <ellipse cx="40" cy="57" rx="13" ry="16" fill="white"/>
  <!-- head -->
  <circle cx="40" cy="26" r="17" fill="#1a1a2e"/>
  <!-- white face -->
  <ellipse cx="40" cy="28" rx="11" ry="12" fill="white"/>
  <!-- eyes -->
  <circle cx="35" cy="23" r="4" fill="#1a1a2e"/>
  <circle cx="45" cy="23" r="4" fill="#1a1a2e"/>
  <circle cx="36.5" cy="21.5" r="1.5" fill="white"/>
  <circle cx="46.5" cy="21.5" r="1.5" fill="white"/>
  <!-- beak -->
  <polygon points="40,29 36,33 44,33" fill="#F5A623"/>
  <!-- flippers -->
  <ellipse cx="20" cy="52" rx="6" ry="12" fill="#1a1a2e" transform="rotate(-20 20 52)"/>
  <ellipse cx="60" cy="52" rx="6" ry="12" fill="#1a1a2e" transform="rotate(20 60 52)"/>
  <!-- feet -->
  <ellipse cx="33" cy="73" rx="7" ry="4" fill="#F5A623" transform="rotate(-10 33 73)"/>
  <ellipse cx="47" cy="73" rx="7" ry="4" fill="#F5A623" transform="rotate(10 47 73)"/>
</svg>
