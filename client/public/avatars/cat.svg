<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- body -->
  <ellipse cx="40" cy="52" rx="22" ry="20" fill="#F4A836"/>
  <!-- head -->
  <circle cx="40" cy="30" r="18" fill="#F4A836"/>
  <!-- ears -->
  <polygon points="22,18 14,4 30,12" fill="#F4A836"/>
  <polygon points="58,18 66,4 50,12" fill="#F4A836"/>
  <polygon points="23,17 17,8 28,13" fill="#FFCBA4"/>
  <polygon points="57,17 63,8 52,13" fill="#FFCBA4"/>
  <!-- eyes -->
  <ellipse cx="33" cy="27" rx="3.5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="47" cy="27" rx="3.5" ry="4" fill="#1a1a1a"/>
  <circle cx="34.5" cy="25.5" r="1.2" fill="white"/>
  <circle cx="48.5" cy="25.5" r="1.2" fill="white"/>
  <!-- nose -->
  <polygon points="40,33 38,31 42,31" fill="#FF8FA3"/>
  <!-- mouth -->
  <path d="M38,33 Q36,36 33,35" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M42,33 Q44,36 47,35" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="22" y1="31" x2="36" y2="33" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <line x1="22" y1="34" x2="36" y2="34" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <line x1="58" y1="31" x2="44" y2="33" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <line x1="58" y1="34" x2="44" y2="34" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <!-- tail -->
  <path d="M62,60 Q72,50 68,40 Q65,32 70,28" stroke="#F4A836" stroke-width="5" fill="none" stroke-linecap="round"/>
