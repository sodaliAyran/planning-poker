<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- body -->
  <ellipse cx="40" cy="54" rx="22" ry="18" fill="#C8A06E"/>
  <!-- head -->
  <circle cx="40" cy="30" r="19" fill="#C8A06E"/>
  <!-- floppy ears -->
  <ellipse cx="21" cy="32" rx="8" ry="13" fill="#A07840" transform="rotate(-15 21 32)"/>
  <ellipse cx="59" cy="32" rx="8" ry="13" fill="#A07840" transform="rotate(15 59 32)"/>
  <!-- snout -->
  <ellipse cx="40" cy="36" rx="9" ry="6" fill="#E8C898"/>
  <!-- eyes -->
  <circle cx="33" cy="26" r="4" fill="#1a1a1a"/>
  <circle cx="47" cy="26" r="4" fill="#1a1a1a"/>
  <circle cx="34.5" cy="24.5" r="1.4" fill="white"/>
  <circle cx="48.5" cy="24.5" r="1.4" fill="white"/>
  <!-- nose -->
  <ellipse cx="40" cy="32" rx="4" ry="3" fill="#1a1a1a"/>
  <circle cx="39" cy="31" r="1" fill="white" opacity="0.5"/>
  <!-- mouth -->
  <path d="M36,35 Q40,40 44,35" stroke="#1a1a1a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M62,52 Q74,44 70,36" stroke="#C8A06E" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
