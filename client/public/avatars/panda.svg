<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- body -->
  <ellipse cx="40" cy="54" rx="22" ry="20" fill="white"/>
  <!-- head -->
  <circle cx="40" cy="29" r="19" fill="white"/>
  <!-- ears -->
  <circle cx="22" cy="14" r="9" fill="#1a1a1a"/>
  <circle cx="58" cy="14" r="9" fill="#1a1a1a"/>
  <!-- eye patches -->
  <ellipse cx="31" cy="27" rx="7" ry="6" fill="#1a1a1a" transform="rotate(-15 31 27)"/>
  <ellipse cx="49" cy="27" rx="7" ry="6" fill="#1a1a1a" transform="rotate(15 49 27)"/>
  <!-- eyes -->
  <circle cx="31" cy="27" r="3.5" fill="white"/>
  <circle cx="49" cy="27" r="3.5" fill="white"/>
  <circle cx="32" cy="27" r="2.2" fill="#1a1a1a"/>
  <circle cx="50" cy="27" r="2.2" fill="#1a1a1a"/>
  <circle cx="32.8" cy="26" r="0.9" fill="white"/>
  <circle cx="50.8" cy="26" r="0.9" fill="white"/>
  <!-- nose -->
  <ellipse cx="40" cy="33" rx="3.5" ry="2.5" fill="#1a1a1a"/>
  <!-- mouth -->
  <path d="M37,35 Q40,39 43,35" stroke="#1a1a1a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- body black markings -->
  <ellipse cx="22" cy="52" rx="8" ry="10" fill="#1a1a1a"/>
  <ellipse cx="58" cy="52" rx="8" ry="10" fill="#1a1a1a"/>
