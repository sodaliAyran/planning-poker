<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- body -->
  <ellipse cx="40" cy="54" rx="20" ry="18" fill="#E8762B"/>
  <!-- head -->
  <circle cx="40" cy="30" r="18" fill="#E8762B"/>
  <!-- ears (pointy) -->
  <polygon points="24,20 18,4 32,16" fill="#E8762B"/>
  <polygon points="56,20 62,4 48,16" fill="#E8762B"/>
  <polygon points="25,19 21,8 30,15" fill="#F5C9B0"/>
  <polygon points="55,19 59,8 50,15" fill="#F5C9B0"/>
  <!-- white muzzle area -->
  <ellipse cx="40" cy="35" rx="10" ry="8" fill="#FAE0D0"/>
  <!-- eyes -->
  <circle cx="33" cy="27" r="4" fill="#1a1a1a"/>
  <circle cx="47" cy="27" r="4" fill="#1a1a1a"/>
  <circle cx="34.5" cy="25.5" r="1.4" fill="white"/>
  <circle cx="48.5" cy="25.5" r="1.4" fill="white"/>
  <!-- nose -->
  <ellipse cx="40" cy="32" rx="3.5" ry="2.5" fill="#1a1a1a"/>
  <!-- mouth -->
  <path d="M37,34 Q40,38 43,34" stroke="#1a1a1a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M60,60 Q76,52 72,38 Q70,30 74,22" stroke="#E8762B" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M72,22 Q76,16 74,10" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
